services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    # No host ports: Postgres only on the Docker network (not reachable from the Internet).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    # No host ports: API only via frontend nginx (service name "backend" on the Docker network).
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind to loopback only so host nginx can proxy; not exposed on public interfaces.
    ports:
      - "127.0.0.1:9000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
