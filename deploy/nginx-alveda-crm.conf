# Скопировать в sites-available и включить symlink в sites-enabled, например:
#   sudo cp deploy/nginx-alveda-crm.conf /etc/nginx/sites-available/alveda-crm
#   sudo ln -s /etc/nginx/sites-available/alveda-crm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ожидается: docker compose поднят, фронт проброшен на 127.0.0.1:9000 (см. docker-compose.yml).
#
# Для HTTPS: certbot (Let's Encrypt) для server_name, отдельный server { listen 443 ssl; ... },
# затем в Django: USE_TLS=True. Не оставляйте открытыми порты БД и API наружу — только 80/443.

upstream alveda_frontend {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 35.244.28.212;

    client_max_body_size 200m;

    location / {
        proxy_pass http://alveda_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
